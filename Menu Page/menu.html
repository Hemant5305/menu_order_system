<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu — Blue Tokai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../Menu Page/menu.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="cafe-name">Blue Tokai</div>
    <div class="cafe-table">Table 7 &nbsp;·&nbsp; Sector 14 Market, Gurugram</div>
  </div>
  <button class="cart-btn" onclick="openCart()">
    <span>Cart</span>
    <span class="cart-count" id="cartCount">0</span>
  </button>
</div>

<!-- CATEGORY TABS -->
<div class="cats" id="cats">
  <div class="cat-tab active" onclick="scrollTo('coffee')">Coffee</div>
  <div class="cat-tab" onclick="scrollTo('tea')">Tea & Beverages</div>
  <div class="cat-tab" onclick="scrollTo('food')">Food</div>
  <div class="cat-tab" onclick="scrollTo('desserts')">Desserts</div>
</div>

<!-- COFFEE -->
<div class="section" id="coffee">
  <div class="section-title">Coffee</div>
  <div class="menu-grid" id="grid-coffee"></div>
</div>

<!-- TEA -->
<div class="section" id="tea">
  <div class="section-title">Tea &amp; Beverages</div>
  <div class="menu-grid" id="grid-tea"></div>
</div>

<!-- FOOD -->
<div class="section" id="food">
  <div class="section-title">Food</div>
  <div class="menu-grid" id="grid-food"></div>
</div>

<!-- DESSERTS -->
<div class="section" id="desserts">
  <div class="section-title">Desserts</div>
  <div class="menu-grid" id="grid-desserts"></div>
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-head">
    <h2>Your order</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="cartItems"></div>
  <div class="drawer-foot">
    <div class="cart-total">
      <span>Total</span>
      <strong id="cartTotal">₹0</strong>
    </div>
    <textarea class="notes-field" id="orderNotes" rows="2" placeholder="Any special instructions for the kitchen?"></textarea>
    <button class="place-btn" id="placeBtn" onclick="placeOrder()">Place order</button>
  </div>
</div>

<!-- ORDER CONFIRM -->
<div class="confirm-panel" id="confirmPanel">
  <div class="confirm-card">
    <div class="confirm-icon">✓</div>
    <h2>Order placed!</h2>
    <p>Your order has been sent to the kitchen. You can track the status below.</p>
    <div class="order-id" id="confirmOrderId">—</div>
    <div class="status-badge">Pending · Kitchen notified</div>
    <br>
    <button class="dismiss-btn" onclick="dismissConfirm()">Back to menu</button>
  </div>
</div>

<div id="toast"></div>

<script src="../Menu Page/menu.js"></script>
</body>
</html>
